services:
  mariadb:
    build: ./requirements/mariadb
    container_name: mariadb
    image: mariadb
    env_file: .env
    ports:
      - "3306:3306"
    volumes:
      - mariadbvolume:/var/lib/mysql
    networks:
      - inception

  wordpress:
    build: ./requirements/wordpress
    container_name: wordpress
    image: wordpress
    env_file: .env
    ports:
      - "9000:9000"
    volumes:
      - wpfiles:/var/www/html
    networks:
      - inception

  nginx:
    build: ./requirements/nginx
    container_name: nginx
    image: nginx
    env_file: .env
    ports:
      - "443:443"
    volumes:
      - wpfiles:/var/www/html
    networks:
      - inception

volumes:
  mariadbvolume:
    driver: local
  wpfiles:
    driver: local

networks:
  inception:
    driver: bridge
