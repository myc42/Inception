services:
  mariadb:
    build: ./requirements/mariadb
    container_name: mariadb
    image: mariadb
    env_file: .env
    ports:
      - "3306:3306"
    volumes:
      - mariadbvolume:/var/lib/mysql
    networks:
      - inception

  wordpress:
    build: ./requirements/wordpress
    container_name: wordpress
    image: wordpress
    env_file: .env
    ports:
      - "9000:80"
    networks:
      - inception

volumes:
  mariadbvolume:
    driver: local

networks:
  inception:
    driver: bridge
